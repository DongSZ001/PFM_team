<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="A public-facing phase-field simulation chat workspace for models, parameters, code, and result interpretation."
      data-i18n-meta="description"
    />
    <meta name="theme-color" content="#fbfbfa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#151617" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/brand/research_assistant_icon.svg" />
    <link rel="shortcut icon" href="/brand/research_assistant_icon.svg" />
    <link rel="apple-touch-icon" href="/brand/research_assistant_icon.svg" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #fbfbfa;
        color: #111315;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Noto Sans SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      html.dark body {
        background: #151617;
        color: #f4f4f2;
      }

      .boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(17, 19, 21, 0.64);
        font-size: 14px;
      }

      html.dark .boot-splash-inner {
        color: rgba(244, 244, 242, 0.72);
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: currentColor;
        opacity: 0.75;
        animation: boot-pulse 1s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.45;
        }
        50% {
          transform: scale(1);
          opacity: 0.85;
        }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("nanobot-webui.theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <script>
      (function () {
        var localeKey = "nanobot.locale";
        var copy = {
          en: {
            boot: "Loading Phase-Field Lab...",
            description:
              "A public-facing phase-field simulation chat workspace for models, parameters, code, and result interpretation."
          },
          "zh-CN": {
            boot: "正在加载相场模拟助手...",
            description:
              "面向公众的相场模拟问答工作台，用于模型建立、参数建议、代码生成和结果图解释。"
          },
          "zh-TW": {
            boot: "正在載入相場模擬助手...",
            description:
              "面向公眾的相場模擬問答工作台，用於模型建立、參數建議、程式碼生成和結果圖解釋。"
          }
        };

        function normalizeLocale(input) {
          if (!input) return "en";
          var raw = String(input).trim();
          if (!raw) return "en";
          if (copy[raw]) return raw;
          var lower = raw.toLowerCase();
          if (lower === "zh" || lower.indexOf("zh-cn") === 0 || lower.indexOf("zh-sg") === 0) {
            return "zh-CN";
          }
          if (
            lower.indexOf("zh-tw") === 0 ||
            lower.indexOf("zh-hk") === 0 ||
            lower.indexOf("zh-mo") === 0 ||
            lower.indexOf("zh-hant") === 0
          ) {
            return "zh-TW";
          }
          return "en";
        }

        try {
          var stored = localStorage.getItem(localeKey);
          var detected =
            stored ||
            (navigator.languages && navigator.languages[0]) ||
            navigator.language ||
            "en";
          var locale = normalizeLocale(detected);
          var localized = copy[locale] || copy.en;
          document.documentElement.lang = locale;
          var description = document.querySelector('[data-i18n-meta="description"]');
          if (description) description.setAttribute("content", localized.description);
          var boot = document.querySelector("[data-boot-copy]");
          if (boot) boot.textContent = localized.boot;
        } catch {}
      })();
    </script>
    <title>Phase-Field Lab</title>
    <script type="module" crossorigin src="/assets/index-bdkoQZLh.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BpXkWESL.css">
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner">
          <span class="boot-dot" aria-hidden="true"></span>
          <span data-boot-copy>Loading Phase-Field Lab...</span>
        </div>
      </div>
    </div>
  </body>
</html>
